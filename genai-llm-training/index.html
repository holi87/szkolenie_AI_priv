<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Szkolenie GenAI i LLM — QualityCat</title>
  <meta name="description" content="Interaktywne szkolenie z GenAI i LLM: ścieżki S1/S2/S3, quizy, test końcowy, certyfikat.">
  <!-- Favicon inline (SVG data-URI) — bez dodatkowego żądania, brak 404 /favicon.ico. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230f1117'/%3E%3Cpath d='M8 3 13 8 8 13 3 8Z' fill='%236ea8fe'/%3E%3C/svg%3E">
  <!-- Anty-flash motywu (UX-3 #72): ustaw [data-theme] PRZED CSS, żeby nie mrugnąć złym motywem.
       Inline + synchronicznie, zero zależności; klucz spójny z assets/ui/theme.js (THEME_KEY). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("genai-training:theme");
        if (t !== "light" && t !== "dark") t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
  <!-- Ścieżki WZGLĘDNE (wymóg GitHub Pages, ADR-0002). -->
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <!-- Skip-link: pierwszy fokusowalny element (WCAG 2.4.1), przed headerem. -->
  <a class="skip-link" href="#view">Przejdź do treści</a>

  <header class="app-header">
    <div class="app-header__bar">
      <div class="brand">
        <span class="brand__logo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" focusable="false"><path d="M8 1.5 14.5 8 8 14.5 1.5 8Z" fill="currentColor"/></svg>
        </span>
        <span class="brand__name">Szkolenie GenAI i LLM</span>
      </div>
      <div class="app-header__meta">
        <!-- Slot przełącznika języka (UX-2 #71): INERTNY do czasu I18N-3 (#79), który wepnie logikę w TEN slot.
             aria-disabled (nie atrybut disabled) — pozostaje fokusowalny i opisany (WCAG), bez działania. -->
        <button id="lang-switch" class="btn btn--ghost lang-switch" type="button"
                aria-disabled="true" title="Wersja EN wkrótce / English coming soon"
                aria-label="Język / Language: polski (wersja angielska wkrótce)">
          <svg class="lang-switch__flag" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 14"
               width="20" height="14" aria-hidden="true" focusable="false">
            <rect width="20" height="14" rx="2" fill="#ffffff" stroke="#67718a" stroke-width="0.5"/>
            <path d="M0 9 h20 v3 a2 2 0 0 1-2 2 H2 a2 2 0 0 1-2-2 Z" fill="#dc143c"/>
          </svg>
          <span class="lang-switch__label">PL</span>
        </button>
        <!-- Toggle motywu (UX-3 #72): aria-pressed odzwierciedla stan (true=jasny). Ikony inline SVG (bez CDN),
             CSS pokazuje właściwą dla aktywnego motywu. Tekst „Motyw" jest nośnikiem (nie sama ikona). -->
        <button id="theme-toggle" class="btn btn--ghost theme-toggle" type="button"
                aria-pressed="false" aria-label="Przełącz motyw jasny/ciemny" title="Motyw jasny/ciemny">
          <svg class="theme-toggle__icon theme-toggle__icon--dark" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M6 1.5A6.5 6.5 0 1 0 14.5 10 5 5 0 0 1 6 1.5Z"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--light" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
            <circle cx="8" cy="8" r="3.2" fill="currentColor"/>
            <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6 13 13M13 3l-1.4 1.4M4.4 11.6 3 13"/>
            </g>
          </svg>
          <span class="theme-toggle__label">Motyw</span>
        </button>
        <span id="path-indicator" class="path-badge" hidden></span>
        <button id="nav-toggle" class="btn btn--ghost nav-toggle" type="button"
                aria-expanded="false" aria-controls="module-nav" hidden>Moduły</button>
        <button id="reset-btn" class="btn btn--ghost" type="button" hidden>Zacznij od nowa</button>
      </div>
    </div>
    <div id="progress" class="progress" hidden>
      <div class="progress__track" role="progressbar" aria-valuemin="0" aria-valuemax="100"
           aria-valuenow="0" aria-labelledby="progress-label">
        <div id="progress-fill" class="progress__fill" style="width:0%"></div>
      </div>
      <span id="progress-label" class="progress__label">Postęp: 0%</span>
    </div>
  </header>

  <div class="layout">
    <nav id="module-nav" class="module-nav" aria-label="Moduły szkolenia" hidden></nav>
    <main id="view" class="view" tabindex="-1">
      <p class="loading">Ładowanie szkolenia…</p>
    </main>
  </div>

  <footer class="app-footer">
    <p>Szkolenie statyczne (GitHub Pages). Postęp zapisujemy lokalnie w tej przeglądarce; nic nie wysyłamy na serwer, brak cookies. <a href="prywatnosc.html">Prywatność</a></p>
  </footer>

  <!-- Dane (data/*.json) ładowane przez fetch() po http(s) — uruchom przez serwer statyczny, nie file://. -->
  <script type="module" src="assets/app.js"></script>
</body>
</html>
