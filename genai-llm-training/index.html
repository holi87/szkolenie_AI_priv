<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Szkolenie GenAI i LLM — QualityCat</title>
  <meta name="description" content="Interaktywne szkolenie z GenAI i LLM: ścieżki S1/S2/S3, quizy, test końcowy, wynik.">
  <!-- Favicon inline (SVG data-URI) — bez dodatkowego żądania, brak 404 /favicon.ico. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230f1117'/%3E%3Cpath d='M8 3 13 8 8 13 3 8Z' fill='%236ea8fe'/%3E%3C/svg%3E">
  <!-- Anty-flash motywu (UX-3 #72, M19 #158): ustaw [data-theme] PRZED CSS, żeby nie mrugnąć złym motywem.
       Inline + synchronicznie, zero zależności; klucz spójny z assets/ui/theme.js (THEME_KEY).
       Domyślny motyw = CIEMNY dla każdego (decyzja właściciela M19): mockup jest dark, redesign Deep Slate
       żyje w trybie ciemnym. Świadomy wybór (storage) ma priorytet; brak wpisu → dark (NIE prefers-color-scheme). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("genai-training:theme");
        if (t !== "light" && t !== "dark") t = "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
  <!-- Ścieżki WZGLĘDNE (wymóg GitHub Pages, ADR-0002). Query ?v=<wersja> = cache-busting (bez buildu):
       bump przy KAŻDYM PR razem z #app-version (AGENTS.md „Wersjonowanie strony") wymusza re-fetch CSS. -->
  <link rel="stylesheet" href="assets/styles.css?v=1.4">
</head>
<body>
  <!-- Skip-link: pierwszy fokusowalny element (WCAG 2.4.1), przed headerem. -->
  <a class="skip-link" href="#view">Przejdź do treści</a>

  <header class="app-header">
    <div class="app-header__bar">
      <div class="brand">
        <!-- Logo-slot: podmienialny (P14) — QualityCat: głowa kota z checkmarkiem jakości.
             Dekoracyjne (aria-hidden na span); znaczenie niesie brand__name / brand__sub.
             fill="currentColor" → dziedziczy color:var(--color-accent) z .brand__logo — oba motywy. -->
        <span class="brand__logo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" focusable="false" aria-hidden="true">
            <!-- Sylwetka głowy kota (spłaszczone uszy + okrągła czaszka) -->
            <path fill="currentColor" d="
              M2.5 10.5
              C2.5 14 4.5 15.5 8 15.5
              C11.5 15.5 13.5 14 13.5 10.5
              C13.5 7.5 11.8 5.8 10.5 5
              L12 1 9.5 3.5
              C9.1 3.2 8.6 3 8 3
              C7.4 3 6.9 3.2 6.5 3.5
              L4 1 5.5 5
              C4.2 5.8 2.5 7.5 2.5 10.5Z
            "/>
            <!-- Checkmark jakości (biały/surface, centrowany w dolnej części głowy) -->
            <polyline points="5.5,10.5 7.2,12.2 10.5,9" fill="none" stroke="var(--color-surface)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <!-- brand__text: lockup nazwy + sub-labelu marki. brand__name lokalizowane przez setChrome/t(). -->
        <span class="brand__text">
          <span class="brand__name">Szkolenie GenAI i LLM</span>
          <span class="brand__sub" aria-hidden="true">QualityCat</span>
        </span>
      </div>
      <div class="app-header__meta">
        <!-- Przełącznik języka (I18N-3 #79): trigger + popup-menu budowane przez assets/ui/lang-switch.js.
             Flaga (dekoracyjna) ORAZ kod/nazwa (nośnik treści) — pełna obsługa klawiatury (arrows/Enter/Esc). -->
        <div class="lang-switch" id="lang-switch">
          <button id="lang-switch-btn" class="btn btn--ghost lang-switch__trigger" type="button"
                  aria-haspopup="menu" aria-expanded="false" aria-label="Język / Language: polski">
            <span class="lang-switch__flag-wrap" id="lang-switch-flag" aria-hidden="true"></span>
            <span class="lang-switch__label" id="lang-switch-label">PL</span>
            <span class="lang-switch__caret" aria-hidden="true">▾</span>
          </button>
        </div>
        <!-- Toggle motywu (UX-3 #72): aria-pressed odzwierciedla stan (true=jasny). Ikony inline SVG (bez CDN),
             CSS pokazuje właściwą dla aktywnego motywu. Tekst „Motyw" jest nośnikiem (nie sama ikona). -->
        <button id="theme-toggle" class="btn btn--ghost theme-toggle" type="button"
                aria-pressed="false" aria-label="Przełącz motyw jasny/ciemny" title="Motyw jasny/ciemny">
          <svg class="theme-toggle__icon theme-toggle__icon--dark" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M6 1.5A6.5 6.5 0 1 0 14.5 10 5 5 0 0 1 6 1.5Z"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--light" xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
            <circle cx="8" cy="8" r="3.2" fill="currentColor"/>
            <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6 13 13M13 3l-1.4 1.4M4.4 11.6 3 13"/>
            </g>
          </svg>
          <span class="theme-toggle__label">Motyw</span>
        </button>
        <span id="path-indicator" class="path-badge" hidden></span>
        <!-- „Moduły" = powrót do hubu wyboru modułów (#88). Widoczny w module/teście/wyniku (mobile); JS steruje. -->
        <button id="nav-toggle" class="btn btn--ghost nav-toggle" type="button" hidden>Moduły</button>
        <button id="back-btn" class="btn btn--ghost" type="button" hidden>Wróć na start</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav id="module-nav" class="module-nav" aria-label="Moduły szkolenia" hidden></nav>
    <main id="view" class="view" tabindex="-1">
      <p class="loading">Ładowanie szkolenia…</p>
    </main>
  </div>

  <!-- Footer lokalizowany przez setChrome() (#81): tekst i link prywatności (href locale-aware). Treść PL = fallback przed/bez JS. -->
  <footer class="app-footer">
    <p><span id="footer-note">Szkolenie statyczne (GitHub Pages). Postęp zapisujemy lokalnie w tej przeglądarce; nic nie wysyłamy na serwer, brak cookies.</span> <a id="footer-privacy-link" href="prywatnosc.html">Prywatność</a></p>
    <!-- Wersja aplikacji (prawy dolny róg). Metadane techniczne (locale-neutralne) — NIE i18n.
         ADR-0002 (bez buildu): bumpowane RĘCZNIE przed każdym PR — patrz AGENTS.md „Wersjonowanie strony". -->
    <span class="app-version" id="app-version">v1.4 · dc87df8</span>
  </footer>

  <!-- Dane (data/*.json) ładowane przez fetch() po http(s) — uruchom przez serwer statyczny, nie file://. -->
  <script type="module" src="assets/app.js"></script>
</body>
</html>
